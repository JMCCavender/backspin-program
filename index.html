<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0C1F14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>The Backspin Program — Anderson Miller Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Graduate&family=Oswald:wght@400;500;600&family=Archivo:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%230C1F14'/><path d='M50 16 84 50 50 84 16 50Z' fill='%23F6B93B'/></svg>">
</head>
<body>

<header class="masthead">
  <p class="eyebrow">Anderson Miller · Unfinished Player Development</p>
  <h1>The Backspin<br>Program</h1>
  <p class="masthead-sub">67 videos · 6 playlists · one swing</p>
</header>

<section class="scoreboard" aria-label="Overall progress">
  <div class="scoreboard-row">
    <span class="scoreboard-label">Watched</span>
    <span class="scoreboard-count"><span id="sb-watched">0</span><span class="scoreboard-sep">/</span><span id="sb-total">67</span></span>
    <span class="scoreboard-pct" id="sb-pct">0%</span>
  </div>
  <div class="chalkbar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="sb-bar">
    <div class="chalkbar-fill" id="sb-fill"></div>
  </div>
</section>

<section class="upnext" id="upnext" aria-label="Up next"></section>

<main id="playlists" aria-label="Playlists"></main>

<footer class="footer">
  <p id="footer-stats"></p>
  <p><a href="https://www.youtube.com/@andersonLmiller" target="_blank" rel="noopener">@andersonLmiller on YouTube</a></p>
  <button class="reset-btn" id="reset-btn">Reset all progress</button>
</footer>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
